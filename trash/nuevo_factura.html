<!DOCTYPE html>
<html>

<head>
    <title>Nueva Factura</title>
</head>

<body>

<h1>Nueva Factura</h1>

<a href="/facturas">← Volver</a>

<br><br>

<form method="POST">

    <label>Número de Factura:</label><br>
    <input
        type="text"
        name="numero_factura_oficial"
        required
    >

    <br><br>

    <label>Cliente:</label><br>

    <select name="id_cliente" required>

        {% for cliente in clientes %}

        <option value="{{ cliente[0] }}">
            {{ cliente[1] }} {{ cliente[2] }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <label>Sede:</label><br>

    <select name="id_sede" required>

        {% for sede in sedes %}

        <option value="{{ sede[0] }}">
            {{ sede[1] }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <label>Empleado:</label><br>

    <select name="id_empleado" required>

        {% for empleado in empleados %}

        <option value="{{ empleado[0] }}">
            {{ empleado[1] }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <select name="forma_pago" required>

    <option value="EFECTIVO">
        EFECTIVO
    </option>

    <option value="DEBITO">
        DÉBITO
    </option>

    <option value="CREDITO">
        CRÉDITO
    </option>

    <option value="BONO">
        BONO
    </option>

</select>
    <br><br>

    <label>Subtotal:</label><br>
    <input
        type="number"
        step="0.01"
        name="subtotal"
        required
    >

    <br><br>

    <label>Total IVA:</label><br>
    <input
        type="number"
        step="0.01"
        name="total_iva"
        required
    >

    <br><br>

    <label>Descuento:</label><br>
    <input
        type="number"
        step="0.01"
        name="total_descuento"
        value="0"
    >

    <br><br>

    <label>Total Factura:</label><br>
    <input
        type="number"
        step="0.01"
        name="total_factura"
        required
    >

    <br><br>

    <label>Valor Pagado:</label><br>
    <input
        type="number"
        step="0.01"
        name="valor_pagado"
        required
    >

    <br><br>

    

    <button type="submit">
        Guardar Factura
    </button>

</form>

</body>

</html>
