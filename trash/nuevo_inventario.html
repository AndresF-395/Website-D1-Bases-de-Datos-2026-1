<!DOCTYPE html>
<html>

<head>
    <title>Nuevo Inventario</title>
</head>

<body>

<h1>Nuevo Registro de Inventario</h1>
{% if mensaje %}
<p style="color:red;">
    {{ mensaje }}
</p>
{% endif %}
<a href="/inventario">← Volver</a>

<br><br>

<form method="POST">

    <label>Producto:</label><br>

    <select name="id_producto" required>

        {% for producto in productos %}
        <option value="{{ producto[0] }}">
            {{ producto[1] }}
        </option>
        {% endfor %}

    </select>

    <br><br>

    <label>Sede:</label><br>

    <select name="id_sede" required>

        {% for sede in sedes %}
        <option value="{{ sede[0] }}">
            {{ sede[1] }}
        </option>
        {% endfor %}

    </select>

    <br><br>

    <label>Cantidad disponible:</label><br>
    <input
        type="number"
        name="cantidad_disponible"
        min="0"
        required
    >

    <br><br>

    <label>Stock mínimo:</label><br>
    <input
        type="number"
        name="stock_minimo"
        min="0"
        required
    >

    <br><br>

    <label>Stock máximo:</label><br>
    <input
        type="number"
        name="stock_maximo"
        min="1"
        required
    >

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

</body>
</html>
