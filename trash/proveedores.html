<!DOCTYPE html>
<html>

<head>
    <title>Proveedores</title>
</head>

<body>

<h1>Lista de Proveedores</h1>

<a href="/">Volver al inicio</a>

<br><br>

<a href="/proveedores/nuevo">
    + Nuevo Proveedor
</a>

<br><br>

<table border="1">

<tr>
    <th>NIT</th>
    <th>Nombre</th>
    <th>Dirección</th>
    <th>Teléfono</th>
    <th>Correo</th>
    <th>Acciones</th>
</tr>


{% for proveedor in proveedores %}

<tr>

<td>{{ proveedor[0] }}</td>
<td>{{ proveedor[1] }}</td>
<td>{{ proveedor[2] }}</td>
<td>{{ proveedor[3] }}</td>
<td>{{ proveedor[4] }}</td>

<td>
    <a href="/proveedores/editar/{{ proveedor[0] }}">
        Editar
    </a>
    |
    <a href="/proveedores/eliminar/{{ proveedor[0] }}">
        Eliminar
    </a>
</td>

</tr>

{% endfor %}


</table>

</body>

</html>
