{% extends 'base.html' %}

{% block title %}Registrar Stock - D1{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold py-3">
                <i class="bi bi-box-arrow-in-down"></i> Ingreso de Inventario
            </div>
            <div class="card-body p-4 bg-white">
                <form method="POST" action="{{ url_for('inventario.nuevo') }}">
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Sede de Destino *</label>
                            <select name="id_sede" class="form-select" required>
                                <option value="" disabled selected>Seleccione la sede...</option>
                                {% for sede in sedes %}
                                    <option value="{{ sede.id_sede }}">{{ sede.nombre_sede }} ({{ sede.ciudad_sede }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Producto *</label>
                            <select name="id_producto" class="form-select" required>
                                <option value="" disabled selected>Seleccione el producto...</option>
                                {% for producto in productos %}
                                    <option value="{{ producto.id_producto }}">{{ producto.nombre_producto }} ({{ producto.codigo_de_barras }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Cantidad a Ingresar *</label>
                            <input type="number" min="1" step="1" name="cantidad_disponible" class="form-control" placeholder="Ej: 50" required>
                        </div>
                    </div>

                    <div class="alert alert-info py-2 small">
                        <i class="bi bi-info-circle"></i> Este formulario es para registros iniciales. Para reabastecimiento, genere una Orden de Pedido.
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('inventario.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar Inventario</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
