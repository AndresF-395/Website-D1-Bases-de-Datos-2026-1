{% extends 'base.html' %}

{% block title %}Nuevo Empleado - D1{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold py-3">
                <i class="bi bi-person-plus"></i> Registrar Nuevo Empleado
            </div>
            <div class="card-body p-4 bg-white">
                <!-- El action debe ir limpio a la ruta nuevo -->
                <form method="POST" action="{{ url_for('empleados.nuevo') }}">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Número de Documento (CC) *</label>
                            <input type="text" name="cedula_empleado" class="form-control" placeholder="Ej: 1023456789" required autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Fecha de Contrato *</label>
                            <input type="date" name="fecha_contrato" class="form-control" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Nombres *</label>
                            <input type="text" name="nombre_empleado" class="form-control" required autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Apellidos *</label>
                            <input type="text" name="apellido_empleado" class="form-control" required autocomplete="off">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Fecha de Nacimiento * (Debe ser mayor de edad)</label>
                            <input type="date" name="fecha_nacimiento" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Cargo *</label>
                            <select name="cargo" class="form-select" required>
                                <option value="" disabled selected>Seleccione el cargo...</option>
                                <option value="Cajero">Cajero</option>
                                <option value="Asistente de Tienda">Asistente de Tienda</option>
                                <option value="Jefe de Tienda">Jefe de Tienda</option>
                                <option value="Supervisor">Supervisor</option>
                                <option value="Personal de Bodega">Personal de Bodega</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Teléfono de Contacto</label>
                            <input type="text" name="telefono_empleado" class="form-control" placeholder="Ej: 315...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Correo Electrónico</label>
                            <input type="email" name="correo_empleado" class="form-control" placeholder="ejemplo@d1.com.co">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Salario Base ($) *</label>
                            <input type="number" min="1" step="any" name="salario" class="form-control text-success fw-bold" placeholder="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Sede Asignada *</label>
                            <select name="id_sede" class="form-select" required>
                                <option value="" disabled selected>Seleccione la sede de trabajo...</option>
                                {% for sede in sedes %}
                                    <option value="{{ sede.id_sede }}">{{ sede.nombre_sede }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('empleados.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar Empleado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
