{% extends 'base.html' %}

{% block title %}Editar Empleado - D1{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold py-3">
                <i class="bi bi-pencil-square"></i> Editar Empleado: {{ empleado.nombre_empleado }} {{ empleado.apellido_empleado }}
            </div>
            <div class="card-body p-4 bg-white">
                <form method="POST" action="{{ url_for('empleados.editar', id_empleado=empleado.id_empleado) }}">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Número de Documento (CC)</label>
                            <input type="text" class="form-control bg-light" value="{{ empleado.cedula_empleado }}" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Fecha de Contrato</label>
                            <input type="date" name="fecha_contrato" class="form-control" value="{{ empleado.fecha_contrato }}" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Nombres *</label>
                            <input type="text" name="nombre_empleado" class="form-control" value="{{ empleado.nombre_empleado }}" required autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Apellidos *</label>
                            <input type="text" name="apellido_empleado" class="form-control" value="{{ empleado.apellido_empleado }}" required autocomplete="off">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Fecha de Nacimiento *</label>
                            <input type="date" name="fecha_nacimiento" class="form-control" value="{{ empleado.fecha_nacimiento }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Cargo *</label>
                            <select name="cargo" class="form-select" required>
                                <option value="Cajero" {% if empleado.cargo == 'Cajero' %}selected{% endif %}>Cajero</option>
                                <option value="Asistente de Tienda" {% if empleado.cargo == 'Asistente de Tienda' %}selected{% endif %}>Asistente de Tienda</option>
                                <option value="Jefe de Tienda" {% if empleado.cargo == 'Jefe de Tienda' %}selected{% endif %}>Jefe de Tienda</option>
                                <option value="Supervisor" {% if empleado.cargo == 'Supervisor' %}selected{% endif %}>Supervisor</option>
                                <option value="Personal de Bodega" {% if empleado.cargo == 'Personal de Bodega' %}selected{% endif %}>Personal de Bodega</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Teléfono de Contacto</label>
                            <input type="text" name="telefono_empleado" class="form-control" value="{{ empleado.telefono_empleado or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Correo Electrónico</label>
                            <input type="email" name="correo_empleado" class="form-control" value="{{ empleado.correo_empleado or '' }}">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Salario Base ($) *</label>
<input type="number" min="1" step="any" name="salario" class="form-control text-success fw-bold" placeholder="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Sede Asignada *</label>
                            <select name="id_sede" class="form-select" required>
                                {% for sede in sedes %}
                                    <option value="{{ sede.id_sede }}" {% if sede.id_sede == empleado.id_sede %}selected{% endif %}>
                                        {{ sede.nombre_sede }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('empleados.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-warning"><i class="bi bi-arrow-clockwise"></i> Actualizar Empleado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
