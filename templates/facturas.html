<!DOCTYPE html>
<html>

<head>
    <title>Facturas</title>
</head>

<body>

<h1>Facturas</h1>

<a href="/">Volver al inicio</a>

<br><br>

<a href="/facturas/nuevo">
    + Nueva Factura
</a>

<br><br>

<table border="1">

<tr>
    <th>Número</th>
    <th>Cliente</th>
    <th>Sede</th>
    <th>Empleado</th>
    <th>Fecha</th>
    <th>Forma de Pago</th>
    <th>Total</th>
    
</tr>

{% for factura in facturas %}

<tr>

<td>{{ factura[0] }}</td>
<td>{{ factura[1] }}</td>
<td>{{ factura[2] }}</td>
<td>{{ factura[3] }}</td>
<td>{{ factura[4] }}</td>
<td>{{ factura[5] }}</td>
<td>{{ factura[6] }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
