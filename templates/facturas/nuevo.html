{% extends 'base.html' %}

{% block title %}Nueva Venta - D1{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="text-secondary fw-bold"><i class="bi bi-cart-plus"></i> Registrar Nueva Venta</h2>
</div>

<form method="POST" action="{{ url_for('facturas.nuevo') }}" id="form-factura">
    <!-- MAESTRO: Datos de Cabecera -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-dark text-white fw-bold py-2">
            Datos Generales de la Factura
        </div>
        <div class="card-body bg-white p-3">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold small text-muted">Cliente *</label>
                    <select name="id_cliente" class="form-select" required>
                        <option value="" disabled selected>Seleccione el cliente...</option>
                        {% for cliente in clientes %}
                            <option value="{{ cliente.id_cliente }}">{{ cliente.nombres }} {{ cliente.apellidos }} (CC: {{ cliente.numero_documento }})</option>
                        {% endfor %}
                    </select>
                </div>
               <div class="col-md-4">
                    <label class="form-label fw-bold small text-muted">Atendido por (Empleado) *</label>
                    <select name="id_empleado" class="form-select" required>
                        <option value="" disabled selected>Seleccione el empleado...</option>
                        {% for empleado in empleados %}
                            <option value="{{ empleado.id_empleado }}">{{ empleado.nombre_empleado }} {{ empleado.apellido_empleado }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold small text-muted">Forma de Pago *</label>
                    <select name="forma_pago" class="form-select" required>
                        <option value="EFECTIVO" selected>Efectivo</option>
                        <option value="DEBITO">Tarjeta Débito</option>
                        <option value="CREDITO">Tarjeta Crédito</option>
                        <option value="BONO">Bono</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- DETALLE: Líneas de Productos -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-secondary text-white fw-bold py-2 d-flex justify-content-between align-items-center">
            <span>Artículos de la Venta</span>
            <button type="button" class="btn btn-sm btn-light text-dark fw-bold" id="btn-add-row"><i class="bi bi-plus-lg"></i> Agregar Producto</button>
        </div>
        <div class="card-body bg-white p-0">
            <table class="table table-borderless mb-0 align-middle" id="tabla-detalles">
                <thead class="table-light border-bottom">
                    <tr>
                        <th style="width: 35%;">Producto</th>
                        <th style="width: 15%;">Precio Unit.</th>
                        <th style="width: 10%;">Cantidad</th>
                        <th style="width: 15%;">Subtotal</th>
                        <th style="width: 15%;">IVA</th>
                        <th style="width: 10%;" class="text-center">Quitar</th>
                    </tr>
                </thead>
                <tbody id="tbody-detalles">
                    <!-- Fila Base (Oculta para clonar) -->
                    <tr class="detalle-row d-none" id="base-row">
                        <td>
                            <!-- Agregamos data-tipo-iva para que el JS lo lea -->
                            <select class="form-select select-producto" name="productos[]" disabled required>
                                <option value="" data-precio="0" data-tipo-iva="EXCLUIDO" disabled selected>Seleccione...</option>
                                {% for prod in productos %}
                                    <option value="{{ prod.id_producto }}" data-precio="{{ prod.precio_venta }}" data-tipo-iva="{{ prod.tipo_iva }}">
                                        {{ prod.nombre_producto }}
                                    </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <input type="number" class="form-control input-precio bg-light" name="precios[]" readonly value="0">
                        </td>
                        <td>
                            <input type="number" class="form-control input-cantidad" name="cantidades[]" min="1" value="1" disabled required>
                        </td>
                        <td>
                            <input type="number" class="form-control input-subtotal bg-light" name="subtotales[]" readonly value="0">
                        </td>
                        <td>
                            <input type="number" class="form-control input-iva bg-light text-danger" name="ivas[]" readonly value="0">
                        </td>
                        <td class="text-center">
                            <button type="button" class="btn btn-outline-danger btn-sm btn-remove-row"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-light border-top p-3">
            <div class="row justify-content-end text-end">
                <div class="col-md-4">
                    <h6 class="text-muted">Subtotal: $<span id="resumen-subtotal">0.00</span></h6>
                    <h6 class="text-danger">Total IVA: $<span id="resumen-iva">0.00</span></h6>
                    <h3 class="mt-2 text-success fw-bold">TOTAL: $<span id="gran-total">0.00</span></h3>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mb-5">
        <a href="{{ url_for('facturas.listar') }}" class="btn btn-outline-secondary btn-lg">Cancelar</a>
        <button type="submit" class="btn btn-primary btn-lg" id="btn-submit"><i class="bi bi-check-circle"></i> Finalizar Venta</button>
    </div>
</form>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const tbody = document.getElementById('tbody-detalles');
        const baseRow = document.getElementById('base-row');
        const btnAdd = document.getElementById('btn-add-row');
        
        const uiSubtotal = document.getElementById('resumen-subtotal');
        const uiIva = document.getElementById('resumen-iva');
        const uiGranTotal = document.getElementById('gran-total');

        function actualizarTotales() {
            let totalSubtotal = 0;
            let totalIva = 0;
            
            document.querySelectorAll('.detalle-row:not(.d-none)').forEach(row => {
                totalSubtotal += parseFloat(row.querySelector('.input-subtotal').value) || 0;
                totalIva += parseFloat(row.querySelector('.input-iva').value) || 0;
            });

            let granTotal = totalSubtotal + totalIva;

            uiSubtotal.innerText = totalSubtotal.toLocaleString('es-CO', { minimumFractionDigits: 2 });
            uiIva.innerText = totalIva.toLocaleString('es-CO', { minimumFractionDigits: 2 });
            uiGranTotal.innerText = granTotal.toLocaleString('es-CO', { minimumFractionDigits: 2 });
        }

        function recalcularFila(row) {
            const select = row.querySelector('.select-producto');
            const option = select.options[select.selectedIndex];
            
            const precio = parseFloat(option.getAttribute('data-precio')) || 0;
            const tipoIva = option.getAttribute('data-tipo-iva') || 'EXCLUIDO';
            const cantidad = parseInt(row.querySelector('.input-cantidad').value) || 0;
            
            // Asignación de tarifas según ley colombiana
            let porcentajeIva = 0;
            if (tipoIva === 'GENERAL') porcentajeIva = 0.19;
            else if (tipoIva === 'DIFERENCIAL') porcentajeIva = 0.05;
            
            const subtotalLinea = precio * cantidad;
            const ivaLinea = subtotalLinea * porcentajeIva;
            
            row.querySelector('.input-precio').value = precio;
            row.querySelector('.input-subtotal').value = subtotalLinea;
            row.querySelector('.input-iva').value = ivaLinea;
            
            actualizarTotales();
        }

        btnAdd.addEventListener('click', function() {
            const newRow = baseRow.cloneNode(true);
            newRow.classList.remove('d-none');
            newRow.removeAttribute('id');
            
            newRow.querySelector('.select-producto').removeAttribute('disabled');
            newRow.querySelector('.input-cantidad').removeAttribute('disabled');
            
            newRow.querySelector('.select-producto').addEventListener('change', () => recalcularFila(newRow));
            newRow.querySelector('.input-cantidad').addEventListener('input', () => recalcularFila(newRow));
            newRow.querySelector('.btn-remove-row').addEventListener('click', function() {
                newRow.remove();
                actualizarTotales();
            });

            tbody.appendChild(newRow);
        });

        document.getElementById('form-factura').addEventListener('submit', function(e) {
            const filasActivas = document.querySelectorAll('.detalle-row:not(.d-none)');
            if (filasActivas.length === 0) {
                e.preventDefault();
                alert("Debe agregar al menos un producto a la factura.");
            }
        });
        
        btnAdd.click(); // Agrega la primera fila al cargar
    });
</script>
{% endblock %}
