{% extends 'base.html' %}

{% block title %}Nuevo Cliente - D1{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold py-3">
                <i class="bi bi-person-plus"></i> Registrar Nuevo Cliente
            </div>
            <div class="card-body p-4 bg-white">
                <form method="POST" action="{{ url_for('clientes.nuevo') }}">
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">Tipo Documento *</label>
                            <select name="tipo_documento" class="form-select" required>
                                <option value="CC">Cédula de Ciudadanía (CC)</option>
                                <option value="CE">Cédula de Extranjería (CE)</option>
                                <option value="NIT">NIT (Persona Jurídica)</option>
                                <option value="PP">Pasaporte</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold small text-muted">Número de Documento *</label>
                            <input type="text" name="numero_documento" class="form-control" placeholder="Ej: 10234567" required autocomplete="off">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Nombres *</label>
                            <input type="text" name="nombres" class="form-control" required autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Apellidos *</label>
                            <input type="text" name="apellidos" class="form-control" required autocomplete="off">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Teléfono</label>
                            <input type="text" name="telefono_cliente" class="form-control" autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Correo Electrónico</label>
                            <input type="email" name="correo_cliente" class="form-control" placeholder="nombre@correo.com" autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">Dirección de Residencia</label>
                        <input type="text" name="direccion_residencia" class="form-control" autocomplete="off">
                    </div>

                    <div class="mb-4 form-check bg-light p-3 rounded border">
                        <input type="checkbox" class="form-check-input ms-1" id="habeas_data" name="habeas_data" required>
                        <label class="form-check-label ms-2 text-dark small" for="habeas_data">
                            <strong>Autorización de Habeas Data *</strong><br>
                            Acepto el tratamiento de mis datos personales de acuerdo con las políticas de Tiendas D1.
                        </label>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('clientes.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar Cliente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
