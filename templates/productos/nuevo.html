{% extends 'base.html' %}

{% block title %}Nuevo Producto - D1{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold py-3">
                <i class="bi bi-box-seam"></i> Registrar Nuevo Producto
            </div>
            <div class="card-body p-4 bg-white">
                <form method="POST" action="{{ url_for('productos.nuevo') }}">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">Código de Barras *</label>
                            <input type="text" name="codigo_de_barras" class="form-control font-monospace" placeholder="Ej: 7701234567890" required autocomplete="off">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold small text-muted">Nombre del Producto *</label>
                            <input type="text" name="nombre_producto" class="form-control" placeholder="Ej: Leche Entera Larga Vida" required autocomplete="off">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Categoría *</label>
                            <select name="tipo_de_producto" class="form-select" required>
                                <option value="" disabled selected>Seleccione...</option>
                                <option value="Aseo">Aseo</option>
                                <option value="Lácteos">Lácteos</option>
                                <option value="Víveres">Víveres</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Cuidado Personal">Cuidado Personal</option>
                                <option value="Otros">Otros</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Marca *</label>
                            <input type="text" name="marca" class="form-control" placeholder="Ej: Latti, Rendidor" required autocomplete="off">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Proveedor *</label>
                            <select name="nit_proveedor" class="form-select" required>
                                <option value="" disabled selected>Seleccione el proveedor...</option>
                                {% for proveedor in proveedores %}
                                    <option value="{{ proveedor.nit_proveedor }}">{{ proveedor.nombre_proveedor }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Tipo de IVA *</label>
                            <select name="tipo_iva" class="form-select" required>
                                <option value="EXCLUIDO" selected>EXCLUIDO</option>
                                <option value="EXENTO">EXENTO</option>
                                <option value="GENERAL">GENERAL</option>
                                <option value="DIFERENCIAL">DIFERENCIAL</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Precio de Compra ($) *</label>
                            <input type="number" step="0.01" min="0.01" name="precio_compra" class="form-control text-danger fw-bold" placeholder="0.00" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Precio de Venta ($) *</label>
                            <input type="number" step="0.01" min="0.01" name="precio_venta" class="form-control text-success fw-bold" placeholder="0.00" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Demanda Diaria Est.</label>
                            <input type="number" min="0" name="demanda_diaria" class="form-control" value="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Fecha Vencimiento</label>
                            <input type="date" name="fecha_vencimiento" class="form-control">
                        </div>
                    </div>

                    <div class="mb-4 form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" role="switch" id="activo" name="activo" value="1" checked>
                        <label class="form-check-label ms-2 fs-6 mt-1" for="activo">Producto Activo para Venta</label>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('productos.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
