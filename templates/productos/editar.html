{% extends 'base.html' %}

{% block title %}Editar Producto - D1{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold py-3">
                <i class="bi bi-pencil-square"></i> Editar Producto: {{ producto.nombre_producto }}
            </div>
            <div class="card-body p-4 bg-white">
                <form method="POST" action="{{ url_for('productos.editar', id_producto=producto.id_producto) }}">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">Código de Barras</label>
                            <!-- El código de barras a menudo es inmutable en la práctica real, pero lo dejamos editable si se requiere corregir un error de tipado -->
                            <input type="text" name="codigo_de_barras" class="form-control font-monospace" value="{{ producto.codigo_de_barras }}" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold small text-muted">Nombre del Producto *</label>
                            <input type="text" name="nombre_producto" class="form-control" value="{{ producto.nombre_producto }}" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Categoría *</label>
                            <select name="tipo_de_producto" class="form-select" required>
                                <option value="Aseo" {% if producto.tipo_de_producto == 'Aseo' %}selected{% endif %}>Aseo</option>
                                <option value="Lácteos" {% if producto.tipo_de_producto == 'Lácteos' %}selected{% endif %}>Lácteos</option>
                                <option value="Víveres" {% if producto.tipo_de_producto == 'Víveres' %}selected{% endif %}>Víveres</option>
                                <option value="Bebidas" {% if producto.tipo_de_producto == 'Bebidas' %}selected{% endif %}>Bebidas</option>
                                <option value="Cuidado Personal" {% if producto.tipo_de_producto == 'Cuidado Personal' %}selected{% endif %}>Cuidado Personal</option>
                                <option value="Otros" {% if producto.tipo_de_producto == 'Otros' %}selected{% endif %}>Otros</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Unidad de Medida *</label>
                            <input type="text" name="unidad_medida" class="form-control" value="{{ producto.unidad_medida }}" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Proveedor *</label>
                            <select name="nit_proveedor" class="form-select" required>
                                {% for proveedor in proveedores %}
                                    <option value="{{ proveedor.nit_proveedor }}" {% if proveedor.nit_proveedor == producto.nit_proveedor %}selected{% endif %}>
                                        {{ proveedor.nombre_proveedor }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Precio de Venta ($) *</label>
                            <input type="number" step="0.01" min="0" name="precio_venta" class="form-control text-success fw-bold" value="{{ producto.precio_venta }}" required>
                        </div>
                    </div>

                    <div class="mb-4 form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" role="switch" id="activo" name="activo" value="1" {% if producto.activo %}checked{% endif %}>
                        <label class="form-check-label ms-2 fs-6 mt-1" for="activo">Producto Activo para Venta</label>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('productos.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-warning"><i class="bi bi-arrow-clockwise"></i> Actualizar Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
