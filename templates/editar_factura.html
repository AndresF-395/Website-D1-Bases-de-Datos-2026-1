<!DOCTYPE html>
<html>

<head>
    <title>Editar Factura</title>
</head>

<body>

<h1>Editar Factura</h1>

<a href="/facturas">← Volver</a>

<br><br>

<form method="POST">

    <p>
        <b>Número de Factura:</b><br>
        {{ factura[1] }}
    </p>

   <label>Forma de Pago:</label><br>

<select name="forma_pago" required>

    <option value="EFECTIVO"
    {% if factura[5] == "EFECTIVO" %}selected{% endif %}>
        EFECTIVO
    </option>

    <option value="DEBITO"
    {% if factura[5] == "DEBITO" %}selected{% endif %}>
        DÉBITO
    </option>

    <option value="CREDITO"
    {% if factura[5] == "CREDITO" %}selected{% endif %}>
        CRÉDITO
    </option>

    <option value="BONO"
    {% if factura[5] == "BONO" %}selected{% endif %}>
        BONO
    </option>

</select>

    <br><br>

    <label>Subtotal:</label><br>
    <input
        type="number"
        step="0.01"
        name="subtotal"
        value="{{ factura[6] }}"
        required
    >

    <br><br>

    <label>Total IVA:</label><br>
    <input
        type="number"
        step="0.01"
        name="total_iva"
        value="{{ factura[7] }}"
        required
    >

    <br><br>

    <label>Total Descuento:</label><br>
    <input
        type="number"
        step="0.01"
        name="total_descuento"
        value="{{ factura[8] }}"
        required
    >

    <br><br>

    <label>Total Factura:</label><br>
    <input
        type="number"
        step="0.01"
        name="total_factura"
        value="{{ factura[9] }}"
        required
    >

    <br><br>

    <label>Valor Pagado:</label><br>
    <input
        type="number"
        step="0.01"
        name="valor_pagado"
        value="{{ factura[10] }}"
        required
    >

    <br><br>

    <label>Cambio Devuelto:</label><br>
    <input
        type="number"
        step="0.01"
        name="cambio_devuelto"
        value="{{ factura[11] }}"
        required
    >

    <br><br>

    <button type="submit">
        Actualizar Factura
    </button>

</form>

</body>

</html>
